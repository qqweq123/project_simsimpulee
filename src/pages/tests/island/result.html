<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex"> <!-- 검색엔진 노출 방지 (중복 컨텐츠 페널티 보호) -->
    <title>무인도 생존유형 결과 - Mellow Wave</title>

    <!-- ========================================== -->
    <!-- 🎯 [필수] Open Graph (카카오톡, 페이스북, 링크드인 등) -->
    <!-- ========================================== -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mellowwave.me/island_test/result">
    <meta property="og:title" content="무인도 생존유형 결과 - Mellow Wave">
    <meta property="og:description" content="무인도에서 나의 생존 유형은? 결과를 확인해보세요!">
    <meta property="og:image"
        content="https://hykzfvrmnnykvinhtucc.supabase.co/storage/v1/object/public/test_image/island_test/banners/hero_campfire.webp">

    <!-- ========================================== -->
    <!-- 🐦 [필수] Twitter Card (X, 슬랙, 디스코드 등) -->
    <!-- ========================================== -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://mellowwave.me/island_test/result">
    <meta name="twitter:title" content="무인도 생존유형 결과 - Mellow Wave">
    <meta name="twitter:description" content="무인도에서 나의 생존 유형은? 결과를 확인해보세요!">
    <meta name="twitter:image"
        content="https://hykzfvrmnnykvinhtucc.supabase.co/storage/v1/object/public/test_image/island_test/banners/hero_campfire.webp">
    <!-- Kakao SDK -->
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.5.0/kakao.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/src/assets/styles/main.css">
    <link rel="stylesheet" href="/src/assets/styles/themes/island.css">
    <style>
        .blur-content {
            filter: blur(8px);
            user-select: none;
            pointer-events: none;
        }

        .lock-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(8px);
            z-index: 100;
        }

        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .compass-spin {
            animation: compassSpin 6s ease-in-out infinite;
        }

        @keyframes compassSpin {

            0%,
            100% {
                transform: rotate(0deg);
            }

            25% {
                transform: rotate(15deg);
            }

            75% {
                transform: rotate(-15deg);
            }
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center py-8 theme-island">

    <div class="max-w-md w-full px-4 relative z-0">
        <h1
            class="font-gaegu text-4xl font-bold text-center mb-6 text-emerald-600 drop-shadow-sm tracking-tighter whitespace-nowrap">
            🏝️ 나의 무인도 생존 유형
        </h1>

        <!-- 결과 카드 -->
        <div id="result-card" class="glass-card rounded-3xl overflow-hidden relative fade-in">

            <!-- 상단 그라데이션 바 -->
            <div id="gradient-bar" class="h-2 bg-gradient-to-r from-emerald-400 to-teal-500 w-full"></div>

            <!-- 전면 광고 및 로딩 화면 (Interstitial Ad) -->
            <div id="lock-overlay" class="lock-overlay fade-in">
                <!-- 광고 영역 (Above the fold, 전면 중앙 배치) -->
                <div
                    class="w-[90vw] max-w-[400px] min-h-[250px] max-h-[60vh] overflow-hidden bg-gray-100 border border-gray-200 flex flex-col items-center justify-center text-gray-400 mb-8 rounded-lg shadow-sm relative">
                    <!-- 구글 AdSense 반응형 스크립트 대기 공간 (비디오 옵션 ON) -->
                    <ins class="adsbygoogle" style="display:block; width:100%; height:100%; min-height:250px;"
                        data-ad-client="ca-pub-XXXXXXXXXX" data-ad-slot="YYYYYYYYYY" data-ad-format="auto"
                        data-full-width-responsive="true"></ins>
                    <script>
                        // 실 서버 배포 시 주석 해제하여 활성화
                        // (adsbygoogle = window.adsbygoogle || []).push({});
                    </script>
                    <!-- 로컬 표시용 더미 UI (배경) -->
                    <div class="absolute inset-0 -z-10 flex flex-col items-center justify-center bg-gray-50">
                        <span class="text-sm font-bold mb-2 text-gray-400">스폰서 광고</span>
                        <span class="text-xs text-gray-300">Responsive AdSense Area</span>
                    </div>
                </div>

                <!-- 로딩 바 및 분석 메시지 -->
                <div class="text-center w-[300px]">
                    <span class="text-4xl mb-4 block compass-spin">🧭</span>
                    <h3 class="text-xl font-bold mb-2 text-emerald-600 font-gaegu tracking-wide" id="loading-title">생존
                        데이터를 분석 중입니다...</h3>
                    <p class="text-sm text-gray-500 mb-6 font-noto">잠시만 기다려주세요</p>

                    <div class="w-full bg-gray-200 rounded-full h-3 mb-6 overflow-hidden relative shadow-inner">
                        <div id="loading-progress"
                            class="bg-gradient-to-r from-emerald-400 to-teal-500 h-3 rounded-full transition-all duration-[3000ms] ease-linear w-0 shadow-md">
                        </div>
                    </div>

                    <button id="btn-unlock" onclick="unlockResult()"
                        class="btn-press w-full bg-emerald-500 text-white font-bold py-3 px-6 rounded-full transition-all opacity-50 cursor-not-allowed"
                        disabled>
                        결과 확인하기
                    </button>
                    <p class="text-xs text-gray-400 mt-4">* 결과 확인을 위해 잠시 기다려주세요</p>
                </div>
            </div>

            <!-- 실제 결과 내용 -->
            <div id="result-content" class="blur-content p-8 text-center transition-all duration-700">

                <!-- 이미지 & 유형명 -->
                <div class="mb-6 relative">
                    <div
                        class="w-48 h-48 mx-auto mb-4 bg-white/50 flex items-center justify-center overflow-hidden border-4 border-white shadow-lg relative blob-portrait">
                        <!-- 이미지 로딩 전 스켈레톤 -->
                        <div class="absolute inset-0 bg-gray-200 animate-pulse skeleton-loader"></div>
                        <img id="result-image" src="" alt="Result Character"
                            class="w-full h-full object-cover z-10 transition-transform hover:scale-110 duration-500"
                            onload="this.previousElementSibling.style.display='none'">
                    </div>


                    <h2 id="result-title"
                        class="text-3xl font-bold text-gray-800 mb-1 break-keep font-gaegu tracking-wide mt-4"></h2>
                    <h3 id="result-subtitle" class="text-base text-emerald-600 font-bold mb-2 font-noto"></h3>
                </div>

                <!-- 태그 -->
                <div class="flex justify-center flex-wrap gap-2 mb-6" id="result-tags"></div>

                <!-- 능력치 그래프 -->
                <div class="bg-white/80 rounded-2xl p-5 mb-6 shadow-sm border border-emerald-100">
                    <h4 class="text-sm font-bold text-gray-600 mb-4 text-left">📊 생존 능력치 분석</h4>
                    <div id="ability-bars">
                        <!-- 능력치 바들이 동적으로 생성됩니다 -->
                    </div>
                </div>

                <!-- 설명 (Typography Rolled Back to V6 with p-5 & inner-shadow) -->
                <p id="result-desc"
                    class="text-gray-700 text-sm leading-7 mb-8 text-left bg-white/80 p-5 rounded-xl min-h-[100px] whitespace-pre-line border border-emerald-100 shadow-inner font-medium">
                </p>

                <!-- 공유 및 뷰어 렌더링 -->
                <div class="border-t border-emerald-100 pt-6">
                    <h4 class="font-bold mb-4 text-sm text-gray-600">🏝️ 친구의 생존 유형도 궁금하다면?</h4>
                    <div id="action-buttons-container" class="flex justify-center gap-2 flex-wrap sm:flex-nowrap px-2">
                        <!-- renderer.js에서 owner/viewer 분기에 따라 버튼을 동적 주입합니다 -->
                    </div>
                </div>

                <!-- 추천 콘텐츠 4선 (Hot Issue - Image-Driven Full-Bleed Banners) -->
                <div class="mt-10 pt-8 border-t border-emerald-100/50 -mx-8 bg-gray-50/30 pb-4">
                    <h3 class="text-sm font-bold text-emerald-800 mb-1 px-8 tracking-tight">🔥 요즘 트렌드 몰아보기</h3>
                    <!-- [Design Architecture] Full-Bleed Panorama + gap-1 px-1 (매우 좁은 간격 복구) -->
                    <div id="hot-contents-container" class="flex flex-col w-full gap-1 px-1">
                        <!-- JS에서 동적으로 삽입됨 -->
                    </div>
                </div>

                <!-- 광고 (공유버튼 하단으로 이동) -->
                <div
                    class="mt-8 h-20 bg-white/50 rounded-xl flex items-center justify-center text-gray-500 text-sm font-semibold border border-emerald-100 shadow-sm relative overflow-hidden">
                    <span class="z-10">Advertisement Area</span>
                    <div
                        class="absolute inset-0 bg-gradient-to-r from-transparent via-white to-transparent opacity-20 -skew-x-12 translate-x-[-100%] animate-[shimmer_2s_infinite]">
                    </div>
                </div>
            </div>
        </div>

        <!-- 하단 버튼 -->
        <div class="mt-8 text-center space-y-4">
            <a href="/src/pages/tests/test_list.html"
                class="btn-press block w-full bg-white border border-emerald-300 text-emerald-600 font-bold py-3 rounded-xl hover:bg-emerald-50 transition shadow-sm">
                다른 테스트 하러 가기 🎨
            </a>
            <a href="/src/pages/tests/island/index.html"
                class="btn-press block w-full bg-emerald-500 text-white font-bold py-3 rounded-xl hover:bg-emerald-600 transition shadow-sm">
                다시 표류하기! 🏝️
            </a>
            <a href="/index.html" class="inline-block text-gray-400 underline text-sm hover:text-gray-600">
                메인 홈으로 이동
            </a>
        </div>
    </div>

    <script type="module">
        import { TestRunner } from '@/core/engine/TestRunner.js';
        import { islandResults, islandMetaData } from '@/features/tests/island/data.js';
        TestRunner.initResultStrategy('island', islandResults, islandMetaData);
    </script>
</body>

</html>
