<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow"> <!-- 검색엔진 노출 방지 (SEO 권위 랜딩 집중) -->
    <title>무인도 생존유형 테스트 진행 중 - Mellow Wave</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/src/assets/styles/main.css">
    <link rel="stylesheet" href="/src/assets/styles/themes/island.css">
    <style>
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="theme-island flex flex-col items-center justify-center p-4">

    <!-- 상단 Mellow Wave 로고 (홈으로 이동) -->
    <a href="/index.html" class="mb-6 opacity-80 hover:opacity-100 transition-opacity flex items-center gap-2">
        <h1 class="text-2xl font-gaegu font-bold tracking-widest text-emerald-800">mellow wave</h1>
    </a>

    <!-- 상단 진행바 -->
    <div class="w-full max-w-md mb-8">
        <div class="flex justify-between text-xs text-gray-500 mb-1 font-bold">
            <span id="progress-text">1 / 10</span>
            <span class="text-emerald-500">🏝️ 생존 시뮬레이션 진행 중...</span>
        </div>
        <div class="w-full bg-emerald-100 rounded-full h-2.5">
            <div id="progress-bar"
                class="bg-gradient-to-r from-emerald-400 to-teal-600 h-2.5 rounded-full transition-all duration-500"
                style="width: 10%"></div>
        </div>
    </div>

    <!-- 질문 카드 -->
    <div id="question-card"
        class="w-full max-w-md bg-white rounded-3xl shadow-lg p-8 text-center fade-in border border-emerald-100">
        <div class="mb-8">
            <h2 class="text-2xl font-bold mb-4 leading-snug break-keep" id="question-text">
                Loading...
            </h2>
        </div>

        <!-- 1선 방어망: 하드코딩된 허니팟 트랩 (JS 실행 전 파싱하는 봇 차단) -->
        <input type="checkbox" name="human_check" id="hp_trap" class="absolute -left-[9999px] opacity-0" tabindex="-1"
            aria-hidden="true" autocomplete="off" />

        <div class="space-y-4" id="answers-container">
            <!-- 수화(Hydration)를 위한 정적 버튼 (메모리 누수 방지용 DOM 재사용) -->
            <button
                class="answer-btn btn-press w-full bg-gray-50 border-2 border-gray-100 text-gray-700 font-medium py-4 px-6 rounded-xl transition-all duration-200 text-left active:bg-gradient-to-r active:from-emerald-500 active:to-teal-600 active:text-white sm:hover:bg-gradient-to-r sm:hover:from-emerald-500 sm:hover:to-teal-600 sm:hover:text-white sm:hover:border-transparent"></button>
            <button
                class="answer-btn btn-press w-full bg-gray-50 border-2 border-gray-100 text-gray-700 font-medium py-4 px-6 rounded-xl transition-all duration-200 text-left active:bg-gradient-to-r active:from-emerald-500 active:to-teal-600 active:text-white sm:hover:bg-gradient-to-r sm:hover:from-emerald-500 sm:hover:to-teal-600 sm:hover:text-white sm:hover:border-transparent"></button>
            <button
                class="answer-btn btn-press w-full bg-gray-50 border-2 border-gray-100 text-gray-700 font-medium py-4 px-6 rounded-xl transition-all duration-200 text-left active:bg-gradient-to-r active:from-emerald-500 active:to-teal-600 active:text-white sm:hover:bg-gradient-to-r sm:hover:from-emerald-500 sm:hover:to-teal-600 sm:hover:text-white sm:hover:border-transparent"></button>
            <button
                class="answer-btn btn-press w-full bg-gray-50 border-2 border-gray-100 text-gray-700 font-medium py-4 px-6 rounded-xl transition-all duration-200 text-left active:bg-gradient-to-r active:from-emerald-500 active:to-teal-600 active:text-white sm:hover:bg-gradient-to-r sm:hover:from-emerald-500 sm:hover:to-teal-600 sm:hover:text-white sm:hover:border-transparent"></button>
        </div>

        <!-- [Phase 6] 데이터 순수성 방어망 (이전/다시하기 네비게이션) -->
        <div class="mt-8 flex justify-center items-center space-x-6" id="nav-container" style="display: none;">
            <button id="btn-back"
                class="text-gray-400 hover:text-emerald-500 font-bold text-sm flex items-center transition-colors">
                <span class="mr-1">◀</span> 이전 문항
            </button>
            <span class="text-gray-200">|</span>
            <button id="btn-restart"
                class="text-gray-400 hover:text-rose-500 font-bold text-sm flex items-center transition-colors">
                <span class="mr-1">↻</span> 다시하기
            </button>
        </div>
    </div>

    <script type="module">
        import { TestRunner } from '@/core/engine/TestRunner.js';
        import { islandQuestions } from '@/features/tests/island/data.js';
        TestRunner.initQuestionStrategy('island', islandQuestions, { leader: 0, explorer: 0, survivor: 0, diplomat: 0 });
    </script>
</body>

</html>
